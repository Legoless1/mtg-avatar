.sort-btn { cursor:pointer; font-size:12px; user-select:none; }
.filter-btn img { width:14px; height:14px; cursor:pointer; }

}

.filter-box label {
    display:block;
    text-align:left;
    margin:0;
}

.footer { margin-top:40px; font-size:12px; color:#888; }

@media print {
    .controls, .sort-btn, .filter-btn, .filter-box, .theme-toggle, .footer { display:none !important; }
    body { margin:10mm; background:white; color:black; }
}

tbody tr {
    transition: background-color 0.15s ease, box-shadow 0.15s ease;
}

tbody tr:hover {
    background: rgba(0,0,0,0.05);
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
}

body.dark tbody tr:hover {

let fileHandle = null;

const headerRow = document.getElementById("tableHeader");
const body = document.getElementById("tableBody");
const progressEl = document.getElementById("progress");

/* Theme */
if(window.matchMedia('(prefers-color-scheme: dark)').matches)
    document.body.classList.add("dark");

function updateToggle(){
    document.getElementById("lightLabel").classList.toggle("active", !document.body.classList.contains("dark"));
    document.getElementById("darkLabel").classList.toggle("active", document.body.classList.contains("dark"));
}
updateToggle();

document.getElementById("themeToggle").addEventListener("click",()=>{
    document.body.classList.toggle("dark");
    updateToggle();
});

/* Build header */
header.forEach((col,i)=>{
    const th=document.createElement("th");
    const wrap=document.createElement("div");
    wrap.className="header-inner";

    const label=document.createElement("span");
    label.textContent=col;
    wrap.appendChild(label);

    const sort=document.createElement("span");
    sort.className="sort-btn";
    sort.textContent="▲";
    sort.dataset.state="asc";
    sort.dataset.col=i;
    wrap.appendChild(sort);

    const filterBtn=document.createElement("span");
    filterBtn.className="filter-btn";
    filterBtn.dataset.col=i;

    const img=document.createElement("img");
    img.src="assets/funnel.png";
    filterBtn.appendChild(img);
    wrap.appendChild(filterBtn);

    const box=document.createElement("div");
    box.className="filter-box";
    box.id="filter-"+i;

    let values = col==="Owned"
        ? ["Yes","No"]
        : [...new Set(data.map(r=>r[i]))].sort((a,b)=>{
        if(i===1){ return Number(a)-Number(b); }
        return a.localeCompare(b, undefined, {numeric:true, sensitivity:'base'});
    });

    box.innerHTML+=`<label><input type="checkbox" value="__ALL__" checked> Select All</label>`;
    values.forEach(v=>box.innerHTML+=`<label><input type="checkbox" value="${v}" checked> ${v}</label>`);

    wrap.appendChild(box);
    th.appendChild(wrap);
    headerRow.appendChild(th);
});

/* Build rows */
data.forEach((row,idx)=>{
    const tr=document.createElement("tr");
    tr.dataset.index=idx;

    row.forEach((cell,i)=>{
        const td=document.createElement("td");
        if(header[i]==="Owned"){
            const cb=document.createElement("input");
            cb.type="checkbox";
            cb.addEventListener("change",updateProgress);
            td.appendChild(cb);
        } else td.textContent=cell;
        tr.appendChild(td);
    });

    body.appendChild(tr);
});

const rows=[...body.querySelectorAll("tr")];
const search=document.getElementById("search");

/* Column width lock */
window.addEventListener("load",()=>{
    header.forEach((_,col)=>{
        let max=0;
        rows.forEach(r=>max=Math.max(max,r.children[col].scrollWidth));
        max=Math.max(max,headerRow.children[col].scrollWidth);
        headerRow.children[col].style.width=max+"px";
        rows.forEach(r=>r.children[col].style.width=max+"px");
    });
});

/* Filter logic */
function applyFilters(){
    const val=search.value.toLowerCase();
    rows.forEach(r=>{
        let visible=r.textContent.toLowerCase().includes(val);

        document.querySelectorAll(".filter-box").forEach(box=>{
            const col=parseInt(box.id.split("-")[1]);
            const checked=[...box.querySelectorAll("input:checked")].map(i=>i.value);

            if(!checked.includes("__ALL__")){
                if(header[col]==="Owned"){
                    const state=r.querySelector("input").checked?"Yes":"No";
                    if(!checked.includes(state)) visible=false;
                } else if(!checked.includes(r.children[col].textContent))
                    visible=false;
            }
        });

        r.style.display=visible?"":"none";
    });
    updateProgress();
}

search.addEventListener("keyup",applyFilters);

document.querySelectorAll(".filter-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
        e.stopPropagation();
        const box=document.getElementById("filter-"+btn.dataset.col);
        box.style.display=box.style.display==="block"?"none":"block";
    });
});

document.querySelectorAll(".filter-box").forEach(box=>box.addEventListener("click",e=>e.stopPropagation()));
document.addEventListener("click",()=>document.querySelectorAll(".filter-box").forEach(b=>b.style.display="none"));

document.querySelectorAll(".filter-box input").forEach(cb=>{
    cb.addEventListener("change",function(){
        if(this.value==="__ALL__")
            this.closest(".filter-box").querySelectorAll("input").forEach(i=>i.checked=this.checked);
        applyFilters();
    });
});

/* 3-state sort */
document.querySelectorAll(".sort-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
        const col=parseInt(btn.dataset.col);
        const state=btn.dataset.state;

        if(state==="asc"){
            rows.sort((a,b)=>compare(a,b,col,true));
            btn.textContent="▼";
            btn.dataset.state="desc";
        } else if(state==="desc"){
            rows.sort((a,b)=>compare(a,b,col,false));
            btn.textContent="↺";
            btn.dataset.state="reset";
        } else {
            rows.sort((a,b)=>a.dataset.index-b.dataset.index);
            btn.textContent="▲";
            btn.dataset.state="asc";
        }

        rows.forEach(r=>body.appendChild(r));
        updateProgress();
    });
});

function compare(a,b,col,asc){
    if(header[col]==="Owned"){
        const av=a.querySelector("input").checked?1:0;
        const bv=b.querySelector("input").checked?1:0;
        return asc?av-bv:bv-av;
    }
    return asc
        ? a.children[col].textContent.localeCompare(b.children[col].textContent,undefined,{numeric:true})
        : b.children[col].textContent.localeCompare(a.children[col].textContent,undefined,{numeric:true});
}

/* Progress */
function updateProgress(){
    const visible=rows.filter(r=>r.style.display!=="none");
    const owned=visible.filter(r=>r.querySelector("input").checked).length;
    const total=visible.length;
    const pct=total?((owned/total)*100).toFixed(1):0;
    progressEl.textContent=`Owned Cards: ${owned} / ${total} (${pct}%)`;
}

/* Save / Load */

document.getElementById("saveBtn").onclick = async function () {

    const owned = [];

    document.querySelectorAll("#tableBody tr").forEach(row => {
        const checkbox = row.querySelector('input[type="checkbox"]');
        if (checkbox && checkbox.checked) {
            const cells = row.querySelectorAll("td");
            const key = cells[0].innerText + "|" + cells[1].innerText + "|" + cells[3].innerText;
            owned.push(key);
        }
    });

    const payload = {
        version: 2,
        owned: owned
    };

    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: "application/json" });

    // Modern browsers (Chromium, Edge, etc.)
    if (window.showSaveFilePicker) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: "grandmaster-checklist.json",
                types: [{
                    description: "JSON File",
                    accept: { "application/json": [".json"] }
                }]
            });

            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
        } catch (e) {
            // user cancelled — do nothing
            return;
        }
    }

    // Universal fallback (Firefox, Safari, iOS)
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "grandmaster-checklist.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
};


document.getElementById("loadBtn").onclick = function() {

    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.style.display = "none";
    document.body.appendChild(input);

    input.onchange = function(e) {

        const file = e.target.files[0];
        if (!file) {
            document.body.removeChild(input);
            return;
        }

        const reader = new FileReader();

        reader.onload = function(ev) {

            let parsed;

            try {
                parsed = JSON.parse(ev.target.result);
            } catch {
                alert("Invalid JSON file.");
                document.body.removeChild(input);
                return;
            }

            if (parsed.version !== 2 || !Array.isArray(parsed.owned)) {
                alert("Unsupported JSON version.");
                document.body.removeChild(input);
                return;
            }

            const ownedSet = new Set(parsed.owned.map(k => k.trim()));

            rows.forEach(r => {
                const cb = r.querySelector("input");
                if (cb) cb.checked = false;
            });

            rows.forEach(r => {
                const cells = r.querySelectorAll("td");
                const key = cells[0].textContent.trim() + "|" +
                            cells[1].textContent.trim() + "|" +
                            cells[3].textContent.trim();

                if (ownedSet.has(key)) {
                    const cb = r.querySelector("input");
                    if (cb) cb.checked = true;
                }
            });

            updateProgress();
            document.body.removeChild(input);
        };

        reader.onerror = function() {
            document.body.removeChild(input);
        };

        reader.readAsText(file);
    };

    input.click();
};;

updateProgress();

</script>
